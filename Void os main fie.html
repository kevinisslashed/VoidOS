<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>musOS</title>
<style>
:root{--bg:#0b0c10;--panel:#15171c;--line:#2a2d35;--gold:#5b8dd6;--text:#e8e6df}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--text);font-family:ui-monospace,Menlo,Consolas,monospace;height:100vh;overflow:hidden}
#desktop{position:relative;height:100vh;background:url('wallpaper.jpg') center/cover no-repeat, radial-gradient(circle at 30% 20%,#181b22,var(--bg))}
#dock{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:10px;background:var(--panel);border:1px solid var(--line);padding:10px;border-radius:14px}
.icon{width:52px;height:52px;border-radius:10px;background:#1c1f26;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;color:var(--text)}
.icon svg{width:24px;height:24px}
.icon:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-4px)}
.win{position:absolute;width:320px;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.6);display:none;overflow:hidden}
.win.open{display:block}
.bar{padding:8px 12px;background:#1c1f26;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;cursor:move;font-size:12px;letter-spacing:.05em}
.bar span.x{cursor:pointer;color:#888}
.bar span.x:hover{color:var(--gold)}
.body{padding:14px;font-size:13px;line-height:1.5}
input,textarea{width:100%;background:#0f1116;border:1px solid var(--line);color:var(--text);padding:6px;font-family:inherit;font-size:12px;border-radius:6px}
textarea{height:100px;resize:none}
button{background:none;border:1px solid var(--gold);color:var(--gold);padding:6px 10px;border-radius:6px;font-family:inherit;cursor:pointer;font-size:12px}
button:hover{background:var(--gold);color:#111}
#bpm{font-size:34px;color:var(--gold);text-align:center}
.pad{width:26px;height:26px;background:#1c1f26;border:1px solid var(--line);display:inline-block;border-radius:4px}
.pad.on{background:var(--gold)}
</style></head>
<body>
<audio src="VOIDos-theme.mp3" loop></audio>
<div id="desktop">
  <div class="win" id="w-player" style="top:60px;left:780px">
    <div class="bar">player<span class="x" onclick="close_('w-player')">✕</span></div>
    <div class="body">
      <input type="file" id="files" accept="audio/*" multiple onchange="loadFiles(event)">
      <ol id="playlist" style="margin:8px 0;padding-left:18px;max-height:100px;overflow:auto"></ol>
      <div id="nowplaying" style="font-size:12px;color:var(--gold);margin-bottom:6px">—</div>
      <audio id="audio" controls style="width:100%" onended="next_()"></audio>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:8px">
        <button onclick="prev_()">◀</button><button onclick="next_()">▶</button>
      </div>
    </div>
  </div>
 
  <div class="win" id="w-notes" style="top:60px;left:60px">
    <div class="bar">notes.txt<span class="x" onclick="close_('w-notes')">✕</span></div>
    <div class="body"><textarea placeholder="lyrics, ideas, chords…"></textarea></div>
  </div>
 
  <div class="win" id="w-metro" style="top:100px;left:420px">
    <div class="bar">metronome<span class="x" onclick="close_('w-metro')">✕</span></div>
    <div class="body">
      <div id="bpm">100</div>
      <div style="display:flex;gap:8px;justify-content:center;margin:10px 0">
        <button onclick="bpm(-5)">-5</button><button onclick="bpm(5)">+5</button>
        <button id="playBtn" onclick="toggleClick()">▶</button>
      </div>
    </div>
  </div>
 
  <div class="win" id="w-tuner" style="top:220px;left:60px">
    <div class="bar">tuner (ref A4)<span class="x" onclick="close_('w-tuner')">✕</span></div>
    <div class="body">
      <label>Hz: <input id="hz" type="number" value="440" style="width:70px;display:inline-block"></label>
      <button onclick="playRef()">Play</button>
    </div>
  </div>
 
  <div class="win" id="w-set" style="top:260px;left:420px">
    <div class="bar">setlist<span class="x" onclick="close_('w-set')">✕</span></div>
    <div class="body">
      <input id="song" placeholder="song title, Enter to add" onkeydown="if(event.key=='Enter')addSong()">
      <ol id="songs" style="margin-top:8px;padding-left:18px"></ol>
    </div>
  </div>
</div>
 
<div id="dock">
  <div class="icon" onclick="open_('w-player')" title="Player"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg></div>
  <div class="icon" onclick="open_('w-notes')" title="Notes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 3h11l3 3v15H5z"/><path d="M16 3v3h3"/><path d="M8 11h8M8 15h8M8 7h4"/></svg></div>
  <div class="icon" onclick="open_('w-metro')" title="Metronome"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 21h10l-2-14H9z"/><path d="M9 7l1-4h4l1 4"/><path d="M12 8v9"/></svg></div>
  <div class="icon" onclick="open_('w-tuner')" title="Tuner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="16" r="3"/><path d="M15 16V4l5-1v13"/></svg></div>
  <div class="icon" onclick="open_('w-set')" title="Setlist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16M4 12h16M4 18h10"/><circle cx="20" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg></div>
</div>
 
<script>
function open_(id){document.getElementById(id).classList.add('open')}
function close_(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.bar').forEach(bar=>{
  const win=bar.parentElement;let dx,dy,drag=false;
  bar.onmousedown=e=>{drag=true;dx=e.clientX-win.offsetLeft;dy=e.clientY-win.offsetTop};
  document.onmousemove=e=>{if(drag){win.style.left=e.clientX-dx+'px';win.style.top=e.clientY-dy+'px'}};
  document.onmouseup=()=>drag=false;
});
 
// metronome
let bpmVal=100,playing=false,timer,ctx;
function bpm(d){bpmVal=Math.max(30,Math.min(240,bpmVal+d));document.getElementById('bpm').textContent=bpmVal;if(playing){stopClick();startClick()}}
function beep(freq=1000,dur=0.05){ctx=ctx||new(window.AudioContext||webkitAudioContext)();const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=freq;o.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(0.15,ctx.currentTime);o.start();o.stop(ctx.currentTime+dur)}
function startClick(){timer=setInterval(()=>beep(),60000/bpmVal)}
function stopClick(){clearInterval(timer)}
function toggleClick(){playing=!playing;document.getElementById('playBtn').textContent=playing?'⏸':'▶';playing?startClick():stopClick()}
 
// tuner
function playRef(){const hz=+document.getElementById('hz').value||440;beep(hz,1)}
 
// setlist
function addSong(){const inp=document.getElementById('song');if(!inp.value.trim())return;const li=document.createElement('li');li.textContent=inp.value;document.getElementById('songs').appendChild(li);inp.value=''}
 
// player
let tracks=[],trackIdx=0;
function loadFiles(e){
  tracks=Array.from(e.target.files);
  const list=document.getElementById('playlist');list.innerHTML='';
  tracks.forEach((f,i)=>{const li=document.createElement('li');li.textContent=f.name;li.style.cursor='pointer';li.onclick=()=>playTrack(i);list.appendChild(li)});
  if(tracks.length)playTrack(0);
}
function playTrack(i){
  trackIdx=i;const f=tracks[i];if(!f)return;
  const audio=document.getElementById('audio');
  audio.src=URL.createObjectURL(f);audio.play();
  document.getElementById('nowplaying').textContent=f.name;
}
function next_(){if(tracks.length)playTrack((trackIdx+1)%tracks.length)}
function prev_(){if(tracks.length)playTrack((trackIdx-1+tracks.length)%tracks.length)}
 
open_('w-notes');open_('w-metro');
</script>
</body></html>
